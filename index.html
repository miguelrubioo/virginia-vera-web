<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>Panel de Reservas — Centro Estética Virginia Vera</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ═══ LOGIN ═══ -->
  <section class="login-screen" id="login-screen">
    <div class="login-card">
      <h1>Panel de Reservas</h1>
      <p class="subtitle">Centro Estética Virginia Vera</p>
      <div id="login-alert"></div>
      <form id="login-form">
        <div class="field">
          <label for="login-email">Email</label>
          <input id="login-email" type="email" autocomplete="username" required />
        </div>
        <div class="field">
          <label for="login-password">Contraseña</label>
          <input id="login-password" type="password" autocomplete="current-password" required />
        </div>
        <button type="submit" class="btn btn-primary" id="login-submit">Entrar</button>
      </form>
    </div>
  </section>

  <!-- ═══ APP (tras login) ═══ -->
  <div id="app-screen">
    <header class="app-header">
      <div>
        <h1>Agenda</h1>
        <div class="business-name" id="business-name-label">Virginia Vera</div>
      </div>
      <button class="btn btn-outline btn-sm" id="logout-btn">Salir</button>
    </header>

    <main class="app-main">
      <div class="date-nav">
        <button class="icon-btn" id="prev-day" aria-label="Día anterior">&#8592;</button>
        <span class="label" id="date-label">Hoy</span>
        <button class="icon-btn" id="next-day" aria-label="Día siguiente">&#8594;</button>
      </div>

      <div class="filter-tabs" id="filter-tabs">
        <button class="filter-tab is-active" data-filter="all">Todas</button>
        <button class="filter-tab" data-filter="pending">Pendientes</button>
        <button class="filter-tab" data-filter="confirmed">Confirmadas</button>
        <button class="filter-tab" data-filter="cancelled">Canceladas</button>
      </div>

      <div id="appt-list"></div>
    </main>

    <nav class="bottom-nav">
      <button class="is-active" data-view="agenda">Agenda</button>
      <button data-view="block">Bloquear horario</button>
    </nav>

    <button class="fab" id="new-appt-fab" aria-label="Crear cita manual">+</button>
  </div>

  <!-- ═══ MODAL: cita manual / walk-in ═══ -->
  <div class="modal-overlay" id="manual-modal">
    <div class="modal-sheet">
      <button class="modal-close" data-close-modal="manual-modal" aria-label="Cerrar">&times;</button>
      <h2>Nueva cita manual</h2>
      <div id="manual-alert"></div>
      <form id="manual-form">
        <div class="field">
          <label for="manual-service">Servicio</label>
          <select id="manual-service" required></select>
        </div>
        <div class="field">
          <label for="manual-date">Fecha</label>
          <input id="manual-date" type="date" required />
        </div>
        <div class="field">
          <label for="manual-time">Hora</label>
          <input id="manual-time" type="time" required />
        </div>
        <div class="field">
          <label for="manual-name">Nombre del cliente</label>
          <input id="manual-name" type="text" required maxlength="200" />
        </div>
        <div class="field">
          <label for="manual-phone">Teléfono</label>
          <input id="manual-phone" type="tel" required maxlength="20" />
        </div>
        <div class="field">
          <label for="manual-notes">Notas (opcional)</label>
          <input id="manual-notes" type="text" maxlength="500" />
        </div>
        <button type="submit" class="btn btn-primary">Crear cita</button>
      </form>
    </div>
  </div>

  <!-- ═══ MODAL: bloquear franja horaria ═══ -->
  <div class="modal-overlay" id="block-modal">
    <div class="modal-sheet">
      <button class="modal-close" data-close-modal="block-modal" aria-label="Cerrar">&times;</button>
      <h2>Bloquear franja horaria</h2>
      <div id="block-alert"></div>
      <form id="block-form">
        <div class="field">
          <label for="block-date-from">Desde</label>
          <input id="block-date-from" type="datetime-local" required />
        </div>
        <div class="field">
          <label for="block-date-to">Hasta</label>
          <input id="block-date-to" type="datetime-local" required />
        </div>
        <div class="field">
          <label for="block-reason">Motivo (opcional)</label>
          <input id="block-reason" type="text" maxlength="200" placeholder="Vacaciones, formación, etc." />
        </div>
        <button type="submit" class="btn btn-primary">Bloquear</button>
      </form>
    </div>
  </div>

  <!-- ═══ MODAL: reprogramar cita ═══ -->
  <div class="modal-overlay" id="reschedule-modal">
    <div class="modal-sheet">
      <button class="modal-close" data-close-modal="reschedule-modal" aria-label="Cerrar">&times;</button>
      <h2>Reprogramar cita</h2>
      <div id="reschedule-alert"></div>
      <form id="reschedule-form">
        <input type="hidden" id="reschedule-appt-id" />
        <div class="field">
          <label for="reschedule-date">Nueva fecha</label>
          <input id="reschedule-date" type="date" required />
        </div>
        <div class="field">
          <label for="reschedule-time">Nueva hora</label>
          <input id="reschedule-time" type="time" required />
        </div>
        <button type="submit" class="btn btn-primary">Guardar cambios</button>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
