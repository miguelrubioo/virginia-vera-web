<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 320" width="300" height="320">
  <!-- Circle -->
  <circle cx="150" cy="110" r="95" fill="none" stroke="#1a1a1a" stroke-width="7"/>

  <!-- Leaf / plant motif at top of circle -->
  <g transform="translate(150, 30)">
    <!-- Left leaf -->
    <path d="M0,0 C-18,-22 -38,-18 -32,2 C-26,20 -8,18 0,0Z" fill="#1a1a1a"/>
    <!-- Right leaf -->
    <path d="M0,0 C18,-22 38,-18 32,2 C26,20 8,18 0,0Z" fill="#1a1a1a"/>
    <!-- Center stem -->
    <line x1="0" y1="0" x2="0" y2="28" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- VV monogram -->
  <g transform="translate(150, 135)" text-anchor="middle">
    <!-- Left V -->
    <text x="-22" y="0"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="68"
      font-weight="700"
      fill="#1a1a1a"
      letter-spacing="-4">V</text>
    <!-- Right V -->
    <text x="22" y="0"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="68"
      font-weight="700"
      fill="#1a1a1a"
      letter-spacing="-4">v</text>
  </g>

  <!-- "Virginia Vera" script text -->
  <text x="150" y="240"
    font-family="'Brush Script MT', 'Dancing Script', cursive"
    font-size="44"
    fill="#1a1a1a"
    text-anchor="middle"
    font-style="italic">Virginia Vera</text>

  <!-- Underline decoration: left line -->
  <line x1="20" y1="258" x2="120" y2="258" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Underline decoration: right line -->
  <line x1="180" y1="258" x2="280" y2="258" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Center dot or small gap -->
  <circle cx="150" cy="258" r="2.5" fill="#1a1a1a"/>

  <!-- Second thinner underline -->
  <line x1="30" y1="266" x2="270" y2="266" stroke="#1a1a1a" stroke-width="1.2" stroke-linecap="round"/>
</svg>
